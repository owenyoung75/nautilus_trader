[test-groups]
serial-tests = { max-threads = 1 }
large-data-tests = { max-threads = 1 }

[profile.default]
# Default settings

[profile.ci]
# GitHub Actions runners have 4 vCPUs and 16GB RAM.
# Limit parallelism to avoid OOM kills from too many concurrent test processes.
test-threads = 2
# Kill hung tests after 10 minutes so the run fails fast with the test name,
# instead of stalling until the workflow timeout with no logs to attribute.
# Tests with a per-test slow-timeout override keep their own settings.
slow-timeout = { period = "120s", terminate-after = 5 }

[[profile.default.overrides]]
filter = 'test(serial_tests)'
test-group = 'serial-tests'

[[profile.default.overrides]]
filter = 'test(test_order_book)'
slow-timeout = { period = "300s" }

# Tests that download large data files share the same target paths across binaries
[[profile.default.overrides]]
filter = 'binary(grid_mm_itch) | binary(backtest_node_itch) | binary(orderbook_integration) | binary(large_data)'
test-group = 'large-data-tests'

# Websocket and data client tests can be flaky due to timing on low-spec runners
[[profile.default.overrides]]
filter = 'binary(websocket) | binary(data_client)'
retries = 3
